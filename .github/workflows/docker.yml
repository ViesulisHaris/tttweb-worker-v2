name: Build and Push Docker Images

# Manual trigger only — base image rarely changes (only when models are added/updated)
on:
  workflow_dispatch:

env:
  REGISTRY: docker.io
  BASE_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/tttweb-base
  FULL_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/tttweb-worker-v2

jobs:
  build-base:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4

      - name: Free disk space (~50GB)
        run: |
          echo "Before cleanup:"
          df -h /
          # Remove pre-installed software that eats 30-40GB
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache
          sudo rm -rf /usr/local/share/boost
          sudo rm -rf /usr/share/swift
          sudo rm -rf /usr/local/graalvm
          sudo rm -rf /usr/local/share/chromium
          sudo rm -rf /usr/local/.ghcup
          sudo rm -rf /usr/local/share/powershell
          sudo rm -rf /opt/az
          sudo rm -rf /opt/microsoft
          sudo rm -rf /usr/share/miniconda
          sudo rm -rf /usr/local/lib/node_modules
          sudo docker image prune --all --force
          sudo apt-get clean
          echo "After cleanup:"
          df -h /

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push base image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.base
          push: true
          tags: |
            ${{ env.BASE_IMAGE }}:latest
            ${{ env.BASE_IMAGE }}:${{ github.sha }}
          no-cache: true

      - name: Build and push full image (base + custom nodes)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ env.FULL_IMAGE }}:latest
            ${{ env.FULL_IMAGE }}:${{ github.sha }}
          no-cache: true
